<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Background Architectural Textures -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none -z-10">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary-container/5 rounded-full blur-[100px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[420px] flex flex-col items-center space-y-8">
<!-- Brand Identity Section -->
<header class="flex flex-col items-center text-center space-y-4">
<div class="w-20 h-20 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center shadow-2xl shadow-primary/20">
<span class="material-symbols-outlined text-white text-5xl" data-icon="sanitizer">sanitizer</span>
</div>
<div class="space-y-1">
<h2 class="text-xs font-bold uppercase tracking-[0.3em] text-primary opacity-60">Bhuiyan Sanitary</h2>
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface">লগইন করুন</h1>
<p class="text-on-surface-variant text-sm font-medium">আপনার অ্যাকাউন্টে প্রবেশ করতে তথ্য দিন</p>
</div>
</header>
<!-- Form Section -->
<div class="w-full bg-surface-container-lowest p-8 rounded-xl space-y-6 shadow-[0_4px_24px_rgba(0,32,26,0.04)]">
<!-- Mobile/Email Input -->
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider block ml-1">মোবাইল নম্বর বা ইমেইল</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="person">person</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-lowest transition-all duration-300 font-medium" placeholder="উদা: 017XXXXXXXX" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider block ml-1">পাসওয়ার্ড</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-low border-none rounded-lg py-4 pl-12 pr-12 text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/10 focus:bg-surface-container-lowest transition-all duration-300 font-medium" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-sm font-semibold text-primary hover:text-secondary transition-colors underline-offset-4 hover:underline" href="#">পাসওয়ার্ড ভুলে গেছেন?</a>
</div>
<!-- Primary Action Button -->
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white rounded-lg py-4 px-6 flex items-center justify-center space-x-3 group active:scale-[0.98] transition-transform duration-150 shadow-lg shadow-primary/20">
<span class="text-base font-bold tracking-wide">লগইন করুন</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer / Redirect -->
<footer class="flex flex-col items-center space-y-4">
<p class="text-on-surface-variant text-sm font-medium">
                আপনার কি অ্যাকাউন্ট নেই?

</p>
</footer>
